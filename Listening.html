<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>TEC Reading Module v1.10</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            height: 100vh;
            overflow: hidden;
            background: #f5f7fb;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: #0b1f3a;
            color: white;
            padding: 10px 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls {
            position: fixed;
            top: 60px;
            width: 100%;
            height: 55px;
            background: white;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 20px;
            border-bottom: 1px solid #ddd;
            z-index: 999;
        }

        button {
            background: #0b1f3a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #163d6b;
        }

        .timer {
            margin-left: auto;
            font-weight: bold;
            color: #e63946;
            font-size: 1.2em;
        }

        .container {
            position: fixed;
            top: 115px;
            bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .main-content {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 40px;
            overflow-y: auto;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
        }

        .main-content div[id^="q"] {
            background: #fff;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
            transition: border 0.3s;
        }

        .drag-container {
            border: 2px dashed #bbb;
            padding: 10px;
            margin: 10px 0;
            min-height: 50px;
            border-radius: 6px;
            background: #fafafa;
        }

        .draggable {
            display: inline-block;
            padding: 6px 12px;
            margin: 5px;
            background: #0b1f3a;
            color: white;
            border-radius: 4px;
            cursor: grab;
        }

        .dropzone {
            display: inline-block;
            min-width: 100px;
            min-height: 28px;
            border-bottom: 2px solid #0b1f3a;
            margin: 0 5px;
            vertical-align: middle;
            background: #f0f4f8;
        }

        .question-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 5px;
            overflow-x: auto;
        }

        .question-nav button {
            min-width: 35px;
            height: 35px;
            border-radius: 6px;
            background: #edf1f7;
            color: #333;
            font-weight: 600;
        }

        .question-nav button:hover {
            background: #0b1f3a;
            color: white;
        }

        h2,
        h4 {
            margin: 0;
        }

        #hiddenAudio {
            display: none;
        }

        body {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        img {
            -webkit-user-drag: none;
            user-drag: none;
        }
    </style>
</head>

<body>

    <header>
        <div>
            <h2>Tajinder's English Classes</h2>
            <h4>Listening Module</h4>
        </div>
    </header>

    <div class="controls">
        <button onclick="setName()">Student Name</button>
        <input type="file" id="fileInput" accept=".docx">
        <input type="file" id="audioInput" accept="audio/*" placeholder="Optional Audio">

        <input type="text" id="ytLinkInput" placeholder="Paste YouTube Link here..."
            style="padding: 8px; width: 200px; border: 1px solid #ccc; border-radius: 4px;">
        <button onclick="startTest()" style="background: #27ae60;">Start Exam</button>
        <button onclick="submitTest()">Submit</button>
        <span class="timer" id="timer">00:00</span>
    </div>

    <audio id="hiddenAudio"></audio>

    <div class="container">
        <div class="main-content" id="mainPanel">
            <div style="text-align: center; color: #888; margin-top: 100px;">
                <h3>Upload DOCX and Audio files to begin the listening test.</h3>
            </div>
        </div>
    </div>

    <div id="yt-player-container" style="position: absolute; top: -9999px; left: -9999px;">
        <div id="youtube-player"></div>
    </div>

    <div class="question-nav" id="nav"></div>

    <script>
        let studentName = "Student";
        let qNum = 1;
        let type4Answers = {};
        let renderedSets = new Set();
        let totalSeconds = 3600;
        let timerInterval;
        let currentSection = 0;

        function setName() {
            let name = prompt("Enter student name:");
            if (name) studentName = name;
        }

        async function startTest() {
            const file = document.getElementById("fileInput").files[0];
            const audioFile = document.getElementById("audioInput").files[0];
            const ytLink = document.getElementById("ytLinkInput").value.trim();

            // Require a DOCX, but allow either Local Audio OR YouTube Link
            if (!file) return alert("Please upload a DOCX file.");
            if (!audioFile && !ytLink) return alert("Please upload an Audio file or paste a YouTube link.");

            // Handle Local Audio if present
            const audio = document.getElementById("hiddenAudio");
            if (audioFile) {
                audio.src = URL.createObjectURL(audioFile);
                audio.play().catch(() => console.log("Audio play blocked"));
                startTimer(audio);
            }

            // Handle YouTube Audio if link is provided
            else if (ytLink) {
                playYouTube(ytLink);
            }

            const zip = await JSZip.loadAsync(await file.arrayBuffer());
            const xml = await zip.file("word/document.xml").async("string");

            const content = await parseDocument(xml, zip);
            process(content);
        }

        let ytPlayer;
        let isYTReady = false;

        // This function is automatically called by the YouTube API when it's loaded
        function onYouTubeIframeAPIReady() {
            isYTReady = true;
        }

        // Function to extract Video ID from a YouTube link
        function getYTVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // Function to play YouTube audio
        function playYouTube(url) {
            const videoId = getYTVideoId(url);
            if (!videoId) return alert("Invalid YouTube URL");

            if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
                ytPlayer.loadVideoById(videoId);
                ytPlayer.playVideo();
            } else {
                ytPlayer = new YT.Player('youtube-player', {
                    height: '0',
                    width: '0',
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0,
                        'disablekb': 1,
                        'origin': window.location.origin // Adds your local server as a trusted origin
                    },
                    events: {
                        'onReady': (event) => event.target.playVideo(),
                        'onError': (e) => console.error("YouTube Player Error", e)
                    }
                });
            }
        }
        // Update your existing parseTECAIInline or link detection logic:
        // When you find a link in your docx processing, use this:
        function handleMediaLink(url) {
            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                // Create a button to play the YouTube link
                return `<button onclick="playYouTube('${url}')" class="play-btn">▶ Play Audio (YT)</button>`;
            } else if (url.endsWith(".mp3")) {
                // Your existing MP3 logic
                return `<audio src="${url}" controls></audio>`;
            }
            return `<a href="${url}" target="_blank">Link</a>`;
        }

        function startTimer(audio) {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let remaining;
                if (audio && audio.duration) {
                    remaining = Math.floor(audio.duration - audio.currentTime);
                } else {
                    // Default 60-minute countdown if no local audio duration exists
                    totalSeconds--;
                    remaining = totalSeconds;
                }

                let m = Math.floor(remaining / 60);
                let s = Math.floor(remaining % 60);
                document.getElementById("timer").innerText = `${m}:${s < 10 ? '0' + s : s}`;

                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    autoSubmitTest();
                }
            }, 1000);
        }
        function getParagraphs(xml) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, "application/xml");
            const nodes = doc.getElementsByTagName("w:p");

            let arr = [];
            for (let p of nodes) {
                let html = "", text = "";
                let runs = p.getElementsByTagName("w:r");

                for (let r of runs) {
                    let t = r.getElementsByTagName("w:t")[0];
                    if (!t) continue;

                    let val = t.textContent;
                    text += val;

                    if (r.getElementsByTagName("w:b").length) val = `<b>${val}</b>`;
                    if (r.getElementsByTagName("w:i").length) val = `<i>${val}</i>`;
                    if (r.getElementsByTagName("w:u").length) val = `<u>${val}</u>`;

                    html += val;
                }
                arr.push({ html, text: text.replace(/\s+/g, " ").trim() });
            }
            return arr;
        }

        async function parseDocument(xml, zip) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, "application/xml");

            const body = doc.getElementsByTagName("w:body")[0].childNodes;

            let content = [];
            let sectionTracker = 0;

            for (let node of body) {

                // PARAGRAPH
                if (node.nodeName === "w:p") {
                    let text = "";
                    let html = "";

                    const runs = node.getElementsByTagName("w:r");

                    for (let r of runs) {
                        let t = r.getElementsByTagName("w:t")[0];
                        if (!t) continue;

                        let val = t.textContent;
                        text += val;

                        if (r.getElementsByTagName("w:b").length) val = `<b>${val}</b>`;
                        if (r.getElementsByTagName("w:i").length) val = `<i>${val}</i>`;
                        if (r.getElementsByTagName("w:u").length) val = `<u>${val}</u>`;

                        html += val;
                    }

                    let trimmedText = text.trim();
                    if (trimmedText.match(/\[TECAI\s*START\]/i)) {
                        sectionTracker++;
                    }

                    content.push({ type: "p", text: text.trim(), html });
                }

                // TABLE
                if (node.nodeName === "w:tbl") {
                    const tableHTML = await renderTable(node, zip, sectionTracker);
                    content.push({ type: "table", html: tableHTML });
                }
            }

            return content;
        }

        async function renderTable(tblNode, zip, sectionId) {
            let html = "<table style='border:none;border-collapse:collapse;width:100%'>";

            const rows = tblNode.getElementsByTagName("w:tr");

            for (let row of rows) {
                html += "<tr>";

                const cells = row.getElementsByTagName("w:tc");

                for (let cell of cells) {
                    html += "<td style='padding:8px;'>";

                    const paragraphs = cell.getElementsByTagName("w:p");

                    for (let p of paragraphs) {

                        const texts = p.getElementsByTagName("w:t");

                        let fullText = "";

                        for (let t of texts) {
                            fullText += t.textContent || "";
                        }

                        fullText = fullText.replace(/\s+/g, " ").trim();

                        // Inside renderTable function, replace the Type 4 detection logic:
                        if (fullText.match(/\[TECAI\s*TYPE\s*4\s*SET\s*(\d+)\]/i)) {
                            let mod = fullText.replace(/\[TECAI\s*TYPE\s*4\s*SET\s*(\d+)\]/gi, (m, id) => {
                                // Use a placeholder class and store the set ID in data-set
                                // We will assign the real ID and Q number during the process() loop
                                return `<div class="table-q-placeholder" data-set-id="${id}"></div>`;
                            });
                            html += `<div>${mod}</div>`;
                        }
                        else {
                            let parsed = parseTECAIInline(fullText);
                            html += `<div>${parsed}</div>`;
                        }
                    }

                    // IMAGE
                    const drawings = cell.getElementsByTagName("w:drawing");
                    const relsXml = await zip.file("word/_rels/document.xml.rels").async("text");
                    const relsDoc = new DOMParser().parseFromString(relsXml, "text/xml");
                    const relationships = Array.from(relsDoc.getElementsByTagName("Relationship"));

                    for (let d of drawings) {
                        const blip = d.getElementsByTagName("a:blip")[0];
                        if (!blip) continue;

                        const embed = blip.getAttribute("r:embed");
                        const relsDoc = new DOMParser().parseFromString(relsXml, "text/xml");

                        const rel = relationships.find(r => r.getAttribute("Id") === embed);

                        if (rel) {
                            const target = rel.getAttribute("Target");
                            const imgFile = "word/" + target;

                            const blob = await zip.file(imgFile).async("blob");
                            const url = URL.createObjectURL(blob);

                            html += `<br><img src="${url}" style="max-width:150px;">`;
                        }
                    }

                    html += "</td>";
                }

                html += "</tr>";
            }

            html += "</table><br>";
            return html;
        }

        function parseTECAIInline(text) {

            if (!text) return "";

            let output = text;

            // [TECAI Type 6]
            output = output.replace(/\[TECAI\s*Type\s*6\]/gi, () => {
                return `<b>${qNum++}.</b>
        <input id="q${qNum - 1}" name="q${qNum - 1}" style="width:100px;margin:0 5px;">`;
            });

            // [ input box ]
            output = output.replace(/\[\s*input\s*box\s*\]/gi, () => {
                return `<b>${qNum++}.</b>
        <input id="q${qNum - 1}" name="q${qNum - 1}" style="width:100px;margin:0 5px;">`;
            });

            return output;
        }

        function process(content) {
            currentSection = 0;
            let inBlock = false;
            let panelHTML = "";
            // qNum = 1;
            type4Answers = {};
            renderedSets = new Set();

            let currentType7Options = [];

            const answerRegex = /\[TECAI\s*TYPE\s*4\s*ANSWER\s*SET\s*(\d+)\]/i;
            const optionRegex = /\[TECAI\s*TYPE\s*4\s*OPTIONS\s*START\s*SET\s*(\d+)\]/i;

            // collect answers
            let tempSection = 0;

            content.forEach(p => {
                let txt = p.text || "";

                if (txt.match(/\[TECAI\s*START\]/i)) {
                    tempSection++;
                    return;
                }
                if (txt.match(/\[TECAI\s*END\]/i)) return;

                let m = txt.match(answerRegex);
                if (m) {
                    let id = m[1];
                    let sectionId = tempSection + "_" + id;

                    let clean = txt.replace(answerRegex, "").trim();

                    if (!type4Answers[sectionId]) {
                        type4Answers[sectionId] = [];
                    }

                    type4Answers[sectionId].push(clean);
                }
            });

            content.forEach(p => {
                let txt = p.text || "";

                if (txt.match(/\[TECAI\s*START\]/i)) {
                    inBlock = true;
                    currentSection++;
                    return;
                }
                if (txt.match(/\[TECAI\s*END\]/i)) { inBlock = false; return; }

                // Inside the process(content) function, find the table handling block:
                if (p.type === "table") {
                    let tempDiv = document.createElement("div");
                    tempDiv.innerHTML = p.html;

                    // Find all placeholders we created in renderTable
                    let placeholders = tempDiv.querySelectorAll(".table-q-placeholder");

                    placeholders.forEach(ph => {
                        let id = ph.getAttribute("data-set-id");
                        let currentQ = qNum++; // Now qNum is assigned in correct document order
                        let dataset = currentSection + "_" + id;

                        // Replace placeholder with actual question HTML
                        ph.outerHTML = `<div id="q${currentQ}"><b>${currentQ}.</b> <span class="dropzone" data-set="${dataset}"></span></div>`;
                    });

                    panelHTML += tempDiv.innerHTML;
                    return;
                }

                if (inBlock) {

                    if (txt.match(answerRegex)) return;

                    let line = p.html || "";

                    // OPTIONS
                    let optMatch = txt.match(optionRegex);
                    if (optMatch) {
                        let id = optMatch[1];
                        let sectionId = currentSection + "_" + id;

                        if (!renderedSets.has(sectionId)) {
                            panelHTML += `<div><b>Options:</b>
          <div class="drag-container" data-set="${sectionId}" id="set_${sectionId}">`;

                            (type4Answers[sectionId] || []).forEach((it, i) => {
                                panelHTML += `<div class="draggable" draggable="true"
            data-set="${sectionId}" id="drag_${sectionId}_${i}">${it}</div>`;
                            });

                            panelHTML += `</div></div>`;
                            renderedSets.add(sectionId);
                        }
                        return;
                    }

                    // TYPE 1 (Radio Buttons)
                    if (txt.match(/\[TECAI\s*Type\s*1\]/i)) {
                        let clean = line.replace(/\[TECAI\s*Type\s*1\]/i, "");
                        panelHTML += `<div id="q${qNum}">
        <b>${qNum}.</b> ${clean}<br>
        <label><input type="radio" name="q${qNum}" value="TRUE"> TRUE</label>
        <label><input type="radio" name="q${qNum}" value="FALSE"> FALSE</label>
        <label><input type="radio" name="q${qNum}" value="NOT GIVEN"> NOT GIVEN</label>
        </div>`;
                        qNum++;
                        return;
                    }

                    // TYPE 2
                    if (txt.match(/\[TECAI\s*Type\s*2\]/i)) {
                        let clean = line.replace(/\[TECAI\s*Type\s*2\]/i, "");
                        panelHTML += `<div id="q${qNum}">
        <b>${qNum}.</b> ${clean}<br>
        <label><input type="radio" name="q${qNum}" value="YES"> YES</label>
        <label><input type="radio" name="q${qNum}" value="NO"> NO</label>
        <label><input type="radio" name="q${qNum}" value="NOT GIVEN"> NOT GIVEN</label>
        </div>`;
                        qNum++;
                        return;
                    }

                    // TYPE 3
                    if (txt.match(/\[TECAI\s*Type\s*3\]/i)) {
                        let temp = document.createElement("div");
                        temp.innerHTML = line;
                        let parts = temp.textContent.split(/\[TECAI Type 3\]/i);
                        let out = "";
                        parts.forEach((t, i) => {
                            out += t;
                            if (i < parts.length - 1) {
                                out += `<input name="q${qNum}_${i}" style="width:120px;">`;
                            }
                        });

                        panelHTML += `<div id="q${qNum}"><b>${qNum}.</b> ${out}</div>`;
                        qNum++;
                        return;
                    }

                    // TYPE 4
                    if (txt.match(/\[TECAI\s*TYPE\s*4\s*SET\s*\d+\]/i)) {
                        let mod = line.replace(/\[TECAI\s*TYPE\s*4\s*SET\s*(\d+)\]/gi,
                            (m, id) => `<span class="dropzone" data-set="${currentSection + "_" + id}"></span>`
                        );
                        panelHTML += `<p id="q${qNum}"><b>${qNum}.</b> ${mod}</p>`;
                        qNum++;
                        return;
                    }

                    //Type 5
                    if (txt.match(/\[TECAI\s*Type\s*5\]/i)) {
                        let clean = txt.replace(/\[TECAI\s*Type\s*5\]/i, "");
                        panelHTML += `<div id="q${qNum}"><b>${qNum}.</b> ${clean}<br>`;
                        return;
                    }

                    if (txt.match(/\[TECAI\s*TYPE\s*5\.1\s*OPTIONS\]/i)) {
                        let opts = txt.replace(/\[TECAI\s*TYPE\s*5\.1\s*OPTIONS\]/i, "").split("/").map(o => o.trim());
                        let targetQ = qNum;

                        opts.forEach(opt => {
                            panelHTML += `<label><input type="radio" name="q${targetQ}" value="${opt}"> ${opt}</label><br>`;
                        });

                        panelHTML += `</div>`;
                        qNum++;
                        return;
                    }

                    if (txt.match(/\[TECAI\s*TYPE\s*5\.2\s*OPTIONS\]/i)) {
                        let opts = txt.replace(/\[TECAI\s*TYPE\s*5\.2\s*OPTIONS\]/i, "").split("/").map(o => o.trim());
                        let targetQ = qNum;

                        opts.forEach(opt => {
                            panelHTML += `<label><input type="checkbox" name="q${targetQ}" value="${opt}"> ${opt}</label><br>`;
                        });

                        panelHTML += `</div>`;
                        qNum++;
                        return;
                    }

                    // TYPE 6 (LONG PARAGRAPH - MULTI QUESTION)
                    if (txt.match(/\[TECAI\s*Type\s*6\]/i)) {

                        let temp = document.createElement("div");
                        temp.innerHTML = line;

                        let parts = temp.textContent.split(/\[TECAI\s*Type\s*6\]/i);

                        let out = "";
                        let startQ = qNum;

                        parts.forEach((t, i) => {
                            out += t;

                            if (i < parts.length - 1) {

                                out += `<b id="q${qNum}">${qNum}.</b> 
            <input name="q${qNum}" style="width:120px; margin:0 5px;">`;

                                qNum++;
                            }
                        });

                        panelHTML += `<div id="q${startQ}">${out}</div>`;

                        return;
                    }


                    // type 7 - dropdown
                    if (txt.match(/\[TECAI\s*TYPE\s*7\]/i) && !txt.match("OPTIONS")) {
                        let clean = txt.replace(/\[TECAI\s*TYPE\s*7\]/i, "").trim();
                        panelHTML += `<div id="q${qNum}"><b>${qNum}.</b> ${clean}`;
                        return;
                    }

                    if (txt.match(/\[TECAI\s*TYPE\s*7\s*OPTIONS\]/i)) {
                        return;
                    }

                    let prevP = content[content.indexOf(p) - 1];
                    if (prevP && prevP.text && prevP.text.match(/\[TECAI\s*TYPE\s*7\s*OPTIONS\]/i) && !txt.match("END")) {
                        let options = txt.split("/").map(o => o.trim());

                        let selectHTML = `<select name="q${qNum}" style="margin-left:10px; padding:4px;">
                        <option value="">Select...</option>`;
                        options.forEach(opt => {
                            selectHTML += `<option value="${opt}">${opt}</option>`;
                        });
                        selectHTML += `</select></div>`;

                        panelHTML += selectHTML;
                        qNum++;
                        return;
                    }

                    // TYPE 8 (Multi-Select with Range Numbering)
                    if (txt.match(/\[TECAI\s*TYPE\s*8\]/i)) {
                        let limit = 2; // Default
                        for (let i = content.indexOf(p); i < content.length; i++) {
                            let peek = content[i].text;
                            let m = peek.match(/\[TECAI\s*TYPE\s*8\.(\d+)\s*OPTIONS\]/i);
                            if (m) {
                                limit = parseInt(m[1]);
                                break;
                            }
                        }

                        let qRange = (limit > 1) ? `${qNum}–${qNum + limit - 1}` : `${qNum}`;
                        let clean = txt.replace(/\[TECAI\s*TYPE\s*8\]/i, "");

                        panelHTML += `<div id="q${qNum}" class="question-container type-8-group" data-limit="${limit}">
                    <b>${qRange}.</b> ${clean}<br>`;
                        return;
                    }

                    if (txt.match(/\[TECAI\s*TYPE\s*8\.(\d+)\s*OPTIONS\]/i)) {
                        let match = txt.match(/8\.(\d+)/);
                        let limit = match ? parseInt(match[1]) : 2;
                        let opts = txt.replace(/\[TECAI\s*TYPE\s*8\.\d+\s*OPTIONS\]/i, "").split("/").map(o => o.trim());

                        opts.forEach(opt => {
                            panelHTML += `
            <label style="display:block; margin: 5px 0;">
                <input type="checkbox" name="q${qNum}" value="${opt}" onchange="limitCheckboxes(this, ${limit})"> 
                ${opt}
            </label>`;
                        });

                        panelHTML += `</div>`;
                        qNum += limit;
                        return;
                    }

                    panelHTML += `<p>${line}</p>`;
                }
                else {
                    panelHTML += `<p>${p.html}</p>`;
                }
            });
            document.getElementById("mainPanel").innerHTML = panelHTML;
            createNav(qNum - 1);
        }

        document.addEventListener("dragstart", e => {
            let el = e.target.closest(".draggable");
            if (el) e.dataTransfer.setData("id", el.id);
        });

        document.addEventListener("dragover", e => {
            if (e.target.closest(".dropzone") || e.target.closest(".drag-container")) {
                e.preventDefault();
            }
        });

        document.addEventListener("drop", e => {
            e.preventDefault();

            let el = document.getElementById(e.dataTransfer.getData("id"));
            if (!el) return;

            let drop = e.target.closest(".dropzone");
            let container = e.target.closest(".drag-container");

            let set = el.dataset.set;

            if (drop) {
                if (set !== drop.dataset.set) return alert("Wrong set");
                if (drop.firstChild) {
                    document.getElementById("set_" + set).appendChild(drop.firstChild);
                }
                drop.innerHTML = "";
                drop.appendChild(el);
            }
            else if (container) {
                if (set !== container.dataset.set) return alert("Wrong set");
                container.appendChild(el);
            }
        });

        /* NAV */
        function createNav() {
            const nav = document.getElementById("nav");
            nav.innerHTML = "";
            let processedQs = new Set();

            for (let i = 1; i < qNum; i++) {
                if (processedQs.has(i)) continue;

                let btn = document.createElement("button");
                btn.classList.add("nav-btn");

                let container = document.getElementById(`q${i}`);
                let label = i.toString();

                // Check if this is a Type 8 range
                if (container && container.classList.contains("type-8-group")) {
                    let limit = parseInt(container.getAttribute("data-limit") || "1");
                    if (limit > 1) {
                        label = `${i}–${i + limit - 1}`;
                        for (let j = 1; j < limit; j++) {
                            processedQs.add(i + j);
                        }
                    }
                }

                btn.innerText = label;
                btn.onclick = () => {
                    document.getElementById(`q${i}`).scrollIntoView({ behavior: "smooth" });
                };
                nav.appendChild(btn);
            }
        }

        function limitCheckboxes(el, max) {
            let name = el.name;
            let checkboxes = document.querySelectorAll(`input[name="${name}"]`);
            let checkedCount = document.querySelectorAll(`input[name="${name}"]:checked`).length;

            checkboxes.forEach(cb => {
                if (checkedCount >= max) {
                    if (!cb.checked) {
                        cb.disabled = true;
                    }
                } else {
                    cb.disabled = false;
                }
            });
        }

        //download answers as text file
        function downloadAnswers() {
            const now = new Date().toLocaleString();

            const content = `Name: ${studentName} 
Date: ${now} 
Answers: 
      
${collectAnswers()}

Self Assessment:
[ ] Confident
[ ] Need Practice
[ ] Time Management Issue
`;

            const blob = new Blob([content], { type: "text/plain" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `${studentName}_${Date.now()}.txt`;
            a.click();
        }

        //collect answers from the form
        function collectAnswers() {
            let data = [];

            for (let i = 1; i < qNum; i++) {
                let qDiv = document.getElementById(`q${i}`);

                // If the question container doesn't exist, skip it 
                if (!qDiv) {
                    data.push(`${i}. `);
                    continue;
                }

                // 1. Check for Type 8 (Question Ranges/Groups) 
                if (qDiv.classList.contains("type-8-group")) {
                    let limit = parseInt(qDiv.getAttribute("data-limit"));
                    let checked = qDiv.querySelectorAll('input:checked');
                    let values = Array.from(checked).map(c => c.value);
                    let rangeLabel = (limit > 1) ? `${i}–${i + limit - 1}` : `${i}`;
                    data.push(`${rangeLabel}. ${values.join(" | ") || " "}`);
                    i += (limit - 1); // Skip indices covered by the range 
                    continue;
                }

                // 2. Check for TYPE 4 (Drag and Drop)
                let drops = qDiv.querySelectorAll(".dropzone");
                if (drops.length > 0) {
                    let values = [];
                    drops.forEach(d => {
                        let dragged = d.querySelector(".draggable");
                        values.push(dragged ? dragged.innerText.trim() : " ");
                    });
                    data.push(`${i}. ${values.join(" | ")}`);
                    continue;
                }

                // 3. Check for Radio Buttons or Checkboxes (Type 1, 2, 5) 
                let checkedInputs = qDiv.querySelectorAll('input[type="radio"]:checked, input[type="checkbox"]:checked');
                if (checkedInputs.length > 0) {
                    let values = Array.from(checkedInputs).map(input => input.value);
                    data.push(`${i}. ${values.join(" | ")}`);
                    continue;
                }

                // 4. Check for Dropdowns (Type 7) 
                let dropdown = qDiv.querySelector("select");
                if (dropdown) {
                    data.push(`${i}. ${dropdown.value.trim() || " "}`);
                    continue;
                }

                // // 5. Check for Text Inputs (Type 3, 6, and input boxes) 
                // let textInputs = qDiv.querySelectorAll('input[type="text"], input:not([type])');
                // if (textInputs.length > 0) {
                //     let values = Array.from(textInputs).map(inp => inp.value.trim() || " ");
                //     data.push(`${i}. ${values.join(" | ")}`);
                //     continue;
                // }

                // 5. Check for Text Inputs (Type 3, 6, and individual input boxes)
                let textInputs = qDiv.querySelectorAll('input[type="text"], input:not([type])');
                if (textInputs.length > 0) {
                    textInputs.forEach(inp => {
                        // Determine the correct question number
                        // If Type 6, the input name attribute (e.g., "q43") is the most accurate source
                        let nameMatch = inp.name.match(/q(\d+)/);
                        let currentNum = nameMatch ? nameMatch[1] : i;

                        data.push(`${currentNum}. ${inp.value.trim() || " "}`);
                    });

                    // If there were multiple inputs (Type 6), we must update the main loop counter 'i'
                    // to the highest question number processed so we don't duplicate them.
                    if (textInputs.length > 1) {
                        let lastInpName = textInputs[textInputs.length - 1].name.match(/q(\d+)/);
                        if (lastInpName) {
                            i = parseInt(lastInpName[1]);
                        }
                    }
                    continue;
                }

                // 6. Default fallback for unanswered questions 
                data.push(`${i}. `);
            }

            return data.join("\n");
        }

        function autoSubmitTest() {
            downloadAnswers();
            // alert("Submitted!");
            // location.reload();
        }

        /* SUBMIT */
        function submitTest() {
            if (confirm("Are you sure you want to submit?")) {
                downloadAnswers();
                // alert("Submitted!");
                // location.reload();
            }
        }
    </script>
