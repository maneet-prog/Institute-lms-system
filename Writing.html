<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>TEC Reading Module v1.10</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            height: 100vh;
            overflow: hidden;
            /* ❌ NO PAGE SCROLL */
            background: #f5f7fb;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: #0b1f3a;
            color: white;
            padding: 10px 20px;
            z-index: 1000;
        }

        header h2 {
            margin: 0;
            font-size: 18px;
        }

        header h4 {
            margin: 2px 0 0;
            font-size: 13px;
            opacity: 0.8;
        }

        /* CONTROLS */
        .controls {
            position: fixed;
            top: 60px;
            width: 100%;
            height: 55px;
            background: white;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 15px;
            border-bottom: 1px solid #ddd;
            z-index: 999;
        }

        button {
            background: #0b1f3a;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #163d6b;
        }

        .timer {
            margin-left: auto;
            font-weight: bold;
            color: #e63946;
        }

        /* MAIN CONTENT AREA */
        .container {
            position: fixed;
            top: 115px;
            /* header + controls */
            bottom: 60px;
            /* nav height */
            width: 100%;
            display: flex;
        }

        .left,
        .right {
            width: 50%;
            padding: 15px;
            overflow-y: auto;
            /* ✅ INTERNAL SCROLL ONLY */
        }

        .left {
            background: white;
            border-right: 1px solid #ddd;
        }

        .right {
            background: #fafbff;
        }

        img {
            width: 70%;
            height: auto;
            margin: 10px 0;
        }

        #essayBox {
            width: 100%;
            height: 80%;
            padding: 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: none;
            line-height: 1.6;
        }

        .word-count {
            margin-left: auto;
            font-weight: bold;
            color: #0b1f3a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        td {
            border: 1px solid #ccc;
            padding: 8px;
        }
    </style>
</head>

<body>

    <header>
        <h2>Tajinder's English Classes</h2>
        <h4>Writing Module</h4>
    </header>

    <div class="controls">
        <button onclick="setName()">Add Student Name</button>
        <input type="file" id="fileInput">
        <button onclick="startWritingTask()">Start</button>
        <button onclick="submitEssay()">Submit</button>
        <span id="wordCounter" class="word-count">Words: 0</span>
        <span class="timer" id="timer">60:00</span>
    </div>

    <div class="container">
        <div class="left" id="left">
        </div>
        <div class="right">
            <h3>Your Response:</h3>
            <textarea id="essayBox" placeholder="Start writing your essay here..."
                oninput="updateWordCount()"></textarea>
        </div>
    </div>

    <div class="question-nav" id="nav"></div>

    <script>

        let studentName = "Student";
        let totalSeconds = 3600;
        let timerInterval;

        function setName() {
            let name = prompt("Enter student name:");
            if (name) studentName = name;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                totalSeconds--;

                let m = Math.floor(totalSeconds / 60);
                let s = totalSeconds % 60;

                document.getElementById("timer").innerText = `${m}:${s < 10 ? '0' + s : '' + s}`;

                if (totalSeconds <= 0) {
                    clearInterval(timerInterval);
                    submitEssay();
                }
            }, 1000);
        }

        async function startWritingTask() {
            const file = document.getElementById("fileInput").files[0];
            if (!file) return alert("Please upload the writing task DOCX");

            const zip = await JSZip.loadAsync(await file.arrayBuffer());
            const xml = await zip.file("word/document.xml").async("string");

            const content = await parseDocument(xml, zip);
            renderTask(content);
            startTimer();
        }

        async function parseDocument(xml, zip) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, "application/xml");
            const body = doc.getElementsByTagName("w:body")[0].childNodes;
            let content = [];

            for (let node of body) {
                if (node.nodeName === "w:p") {
                    let p_html = "";
                    const runs = node.getElementsByTagName("w:r");

                    for (let r of runs) {
                        let runText = "";
                        const t = r.getElementsByTagName("w:t")[0];
                        if (t) {
                            runText = t.textContent;

                            if (r.getElementsByTagName("w:b").length > 0) runText = `<b>${runText}</b>`;
                            if (r.getElementsByTagName("w:i").length > 0) runText = `<i>${runText}</i>`;
                            if (r.getElementsByTagName("w:u").length > 0) runText = `<u>${runText}</u>`;

                            p_html += runText;
                        }

                        const drawings = r.getElementsByTagName("w:drawing");
                        for (let d of drawings) {
                            const imgHtml = await getImageHtml(d, zip);
                            if (imgHtml) p_html += imgHtml;
                        }
                    }
                    content.push(p_html);
                }
                if (node.nodeName === "w:tbl") {
                    const tableHTML = await renderTable(node, zip);
                    content.push({ type: "table", html: tableHTML });
                }
            }
            return content;
        }

        async function renderTable(tblNode, zip) {
            let html = "<table border='1' style='border-collapse:collapse;width:100%'>";

            const rows = tblNode.getElementsByTagName("w:tr");

            for (let row of rows) {
                html += "<tr>";

                const cells = row.getElementsByTagName("w:tc");

                for (let cell of cells) {
                    html += "<td style='padding:8px;'>";

                    const paragraphs = cell.getElementsByTagName("w:p");

                    for (let p of paragraphs) {

                        const texts = p.getElementsByTagName("w:t");

                        let fullText = "";

                        for (let t of texts) {
                            fullText += t.textContent;
                        }

                        // IMPORTANT: normalize spaces
                        fullText = fullText.replace(/\s+/g, " ").trim();

                        // APPLY TECAI
                        let parsed = parseTECAIInline(fullText);

                        html += `<div>${parsed}</div>`;
                    }

                    // IMAGE
                    const drawings = cell.getElementsByTagName("w:drawing");
                    const relsXml = await zip.file("word/_rels/document.xml.rels").async("text");
                    const relsDoc = new DOMParser().parseFromString(relsXml, "text/xml");
                    const relationships = Array.from(relsDoc.getElementsByTagName("Relationship"));

                    for (let d of drawings) {
                        const blip = d.getElementsByTagName("a:blip")[0];
                        if (!blip) continue;

                        const embed = blip.getAttribute("r:embed");
                        const relsDoc = new DOMParser().parseFromString(relsXml, "text/xml");

                        const rel = relationships.find(r => r.getAttribute("Id") === embed);

                        if (rel) {
                            const target = rel.getAttribute("Target");
                            const imgFile = "word/" + target;

                            const blob = await zip.file(imgFile).async("blob");
                            const url = URL.createObjectURL(blob);

                            html += `<br><img src="${url}" style="max-width:150px;">`;
                        }
                    }

                    html += "</td>";
                }

                html += "</tr>";
            }

            html += "</table><br>";
            return html;
        }

        function parseTECAIInline(text) {

            if (!text) return "";

            let output = text;

            // [TECAI Type 6]
            output = output.replace(/\[TECAI\s*Type\s*6\]/gi, () => {
                return `<b>${qNum++}.</b>
        <input name="q${qNum - 1}" style="width:100px;margin:0 5px;">`;
            });

            // [ input box ]
            output = output.replace(/\[\s*input\s*box\s*\]/gi, () => {
                return `<b>${qNum++}.</b>
        <input name="q${qNum - 1}" style="width:100px;margin:0 5px;">`;
            });

            return output;
        }



        async function getImageHtml(drawingNode, zip) {
            const blip = drawingNode.getElementsByTagName("a:blip")[0];
            if (!blip) return null;

            const embedId = blip.getAttribute("r:embed");
            const relsXml = await zip.file("word/_rels/document.xml.rels").async("text");
            const relsDoc = new DOMParser().parseFromString(relsXml, "text/xml");
            const rel = Array.from(relsDoc.getElementsByTagName("Relationship"))
                .find(r => r.getAttribute("Id") === embedId);

            if (rel) {
                const target = rel.getAttribute("Target");
                const blob = await zip.file("word/" + target).async("blob");
                return `<br><img src="${URL.createObjectURL(blob)}">`;
            }
            return null;
        }

        function renderTask(content) {
            const leftPanel = document.getElementById("left");
            leftPanel.innerHTML = ""; // Clear existing content

            content.forEach(item => {
                if (typeof item === 'string') {
                    // It's a standard paragraph
                    const p = document.createElement("p");
                    p.innerHTML = item;
                    leftPanel.appendChild(p);
                } else if (item.type === "table") {
                    // It's a table object
                    const div = document.createElement("div");
                    div.innerHTML = item.html;
                    leftPanel.appendChild(div);
                }
            });
        }

        function updateWordCount() {
            const text = document.getElementById("essayBox").value.trim();
            const count = text ? text.split(/\s+/).length : 0;
            document.getElementById("wordCounter").innerText = `Words: ${count}`;
        }

        function submitEssay() {
            if (confirm("Are you sure you want to submit?")) {
                const essay = document.getElementById("essayBox").value;
                const now = new Date().toLocaleString();
                const userinfo = `Name: ${studentName} 
Date: ${now} 
Answer: 
${essay}`;
                const blob = new Blob([userinfo], { type: "text/plain" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `Essay_${Date.now()}.txt`;
                a.click();
            }
        }
    </script>
</body>

</html>
